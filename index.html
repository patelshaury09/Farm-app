<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S P FARM ULTRA PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
--bg: linear-gradient(135deg,#1e3c72,#2a5298);
--glass: rgba(255,255,255,0.15);
--text:#fff;
--primary:#00c6ff;
}
.light{
--bg:#f5f5f5;
--glass:#fff;
--text:#000;
}
body{margin:0;font-family:'Segoe UI';background:var(--bg);color:var(--text);}
.sidebar{width:220px;background:rgba(0,0,0,0.6);padding:20px;height:100vh;position:fixed;display:none}
.main{margin-left:240px;padding:20px;display:none}
.card{background:var(--glass);padding:20px;border-radius:15px;margin:15px 0}
input,button{padding:10px;margin:5px;border-radius:8px;border:none}
button{background:var(--primary);cursor:pointer}
table{width:100%;text-align:center;border-collapse:collapse}
th,td{padding:10px}
img{width:60px;border-radius:8px}
#loginBox{position:fixed;width:100%;height:100%;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center}
#popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;padding:20px;border-radius:10px;text-align:center}
#popup img{width:120px}
#toast{position:fixed;bottom:20px;right:20px;background:#000;color:#fff;padding:10px;border-radius:8px;display:none}
</style>
</head>

<body>

<div id="loginBox">
<h2>🔐 Login</h2>
<input type="password" id="pass">
<button onclick="login()">Login</button>

<h3>Change Password</h3>
<input type="password" id="newPass">
<button onclick="changePass()">Change</button>
</div>

<div class="sidebar" id="sidebar">
<h2>🐄 FARM</h2>
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('records')">Records</button>
<button onclick="showSection('invoice')">Invoice</button>
<button onclick="backup()">Backup</button>
<button onclick="toggleMode()">Mode</button>
<input placeholder="Search..." oninput="searchData(this.value)">
</div>

<div class="main" id="main">

<input placeholder="Search Breed..." oninput="filterBreed(this.value)">

<!-- BUY SELL -->
<div class="card">
<h3>💰 Buy / Sell Cow</h3>
<input id="cowName" placeholder="Cow Name">
<input id="cowPrice" type="number" placeholder="Price">
<select id="cowType">
<option>Buy</option>
<option>Sell</option>
</select>
<button onclick="addTrade()">Add</button>
<table id="tradeTable"></table>
</div>

<!-- COW TRACK -->
<div class="card">
<h3>📊 Per Cow Milk Tracking</h3>
<input id="cowTrackName" placeholder="Cow Name">
<input id="cowMilk" type="number" placeholder="Milk">
<button onclick="addCowMilk()">Add</button>
<canvas id="cowChart"></canvas>
</div>

<div id="dashboard">

<div class="card">
<h3>🐄 Cow Breeds</h3>
<table id="breedTable">
<tr><th>Breed</th><th>Milk</th><th>Price</th><th>Photo</th></tr>

<tr onclick="showBreed('Gir','12L/day','₹60000','Gujarat','https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTHrHdAkd4u7U3VGO0JAfBbPPWB_wiw5xijMg&s.jpg')">
<td>Gir</td><td>12L</td><td>₹60000</td>
<td><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTHrHdAkd4u7U3VGO0JAfBbPPWB_wiw5xijMg&s.jpg"></td>
</tr>

<tr onclick="showBreed('Jersey','15L/day','₹50000','USA','https://cdn.britannica.com/22/522-050-25222A61/Jersey-cow.jpg')">
<td>Jersey</td><td>15L</td><td>₹50000</td>
<td><img src="https://cdn.britannica.com/22/522-050-25222A61/Jersey-cow.jpg"></td>
</tr>

<tr onclick="showBreed('Sahiwal','10L/day','₹55000','India','https://docs.krishnayangauraksha.org/blog/09_08_2024_15_13_37_What%20is%20Sahiwal%20Cow.jpg')">
<td>Sahiwal</td><td>10L</td><td>₹55000</td>
<td><img src="https://docs.krishnayangauraksha.org/blog/09_08_2024_15_13_37_What%20is%20Sahiwal%20Cow.jpg"></td>
</tr>

<tr onclick="showBreed('HF','25L/day','₹70000','Europe','https://cdn.britannica.com/53/157153-050-E5582B5A/Holstein-cow.jpg')">
<td>HF</td><td>25L</td><td>₹70000</td>
<td><img src="https://cdn.britannica.com/53/157153-050-E5582B5A/Holstein-cow.jpg"></td>
</tr>

<tr onclick="showBreed('Red Sindhi','9L/day','₹48000','Pakistan','https://raghunandansureshgaushala.com/wp-content/uploads/2021/11/red-sindhi-1.jpg')">
<td>Red Sindhi</td><td>9L</td><td>₹48000</td>
<td><img src="https://raghunandansureshgaushala.com/wp-content/uploads/2021/11/red-sindhi-1.jpg"></td>
</tr>

<tr onclick="showBreed('Tharparkar','10L/day','₹52000','Rajasthan','https://cpimg.tistatic.com/08327105/b/4/Pure-Breed-Tharparkar-Cow.jpg')">
<td>Tharparkar</td><td>10L</td><td>₹52000</td>
<td><img src="https://cpimg.tistatic.com/08327105/b/4/Pure-Breed-Tharparkar-Cow.jpg"></td>
</tr>

<tr onclick="showBreed('Kankrej','12L/day','₹58000','Gujarat','https://www.dairyknowledge.in/dkp/sites/default/files/styles/medium_large/public/kankrej_cow.jpg?itok=7Mp-cO4S')">
<td>Kankrej</td><td>12L</td><td>₹58000</td>
<td><img src="https://www.dairyknowledge.in/dkp/sites/default/files/styles/medium_large/public/kankrej_cow.jpg?itok=7Mp-cO4S"></td>
</tr>

<tr onclick="showBreed('Ongole','8L/day','₹45000','Andhra Pradesh','https://images.news18.com/ibnkhabar/uploads/2025/03/images-2025-03-07T093537.027-2025-03-667f35f17bd5dd0a82d6fd15a2b75f4c.jpg?impolicy=website&width=640&height=480')">
<td>Ongole</td><td>8L</td><td>₹45000</td>
<td><img src="https://images.news18.com/ibnkhabar/uploads/2025/03/images-2025-03-07T093537.027-2025-03-667f35f17bd5dd0a82d6fd15a2b75f4c.jpg?impolicy=website&width=640&height=480"></td>
</tr>

<tr onclick="showBreed('Deoni','7L/day','₹40000','Maharashtra','https://cdn.shopify.com/s/files/1/0987/0002/files/Deoni_large.jpg?9657090759441910019.jpg')">
<td>Deoni</td><td>7L</td><td>₹40000</td>
<td><img src="https://cdn.shopify.com/s/files/1/0987/0002/files/Deoni_large.jpg?9657090759441910019.jpg"></td>
</tr>

<tr onclick="showBreed('Rathi','9L/day','₹47000','Rajasthan','https://www.dairyknowledge.in/dkp/sites/default/files/styles/medium_large/public/rathi_cow.jpg?itok=hU1pY0Q8')">
<td>Rathi</td><td>9L</td><td>₹47000</td>
<td><img src="https://www.dairyknowledge.in/dkp/sites/default/files/styles/medium_large/public/rathi_cow.jpg?itok=hU1pY0Q8"></td>
</tr>

</table>
</div>

</div>

<!-- RECORD -->
<div id="records" style="display:none">
<div class="card"><table id="table"></table></div>
<canvas id="milkChart"></canvas>
<canvas id="expenseChart"></canvas>
<canvas id="profitChart"></canvas>
</div>

<!-- INVOICE -->
<div id="invoice" style="display:none">
<div class="card">
<input id="cust" placeholder="Customer">
<input id="liters" type="number" placeholder="Liters">
<input id="rate" type="number" placeholder="Rate">
<button onclick="generateInvoice()">Generate</button>
<button onclick="downloadPDF()">Download PDF</button>
<p id="bill"></p>
</div>
</div>

</div>

<div id="popup">
<h3 id="bname"></h3>
<p id="bmilk"></p>
<p id="bprice"></p>
<p id="bplace"></p>
<img id="bimg">
<br><br>
<button onclick="closePopup()">Close</button>
</div>

<div id="toast"></div>

<script>

// INIT
if(!localStorage.pass) localStorage.pass="1234";
if(!localStorage.data) localStorage.data="[]";
if(!localStorage.trades) localStorage.trades="[]";
if(!localStorage.cowMilk) localStorage.cowMilk="[]";

// LOGIN
function login(){
if(pass.value===localStorage.pass){
loginBox.style.display="none";
main.style.display="block";
sidebar.style.display="block";
load();
loadTrades();
drawCharts();
drawCowChart();
}else alert("Wrong Password");
}

// PASSWORD
function changePass(){
if(newPass.value){
localStorage.pass=newPass.value;
alert("Password Changed");
}
}

// NAV
function showSection(id){
dashboard.style.display="none";
records.style.display="none";
invoice.style.display="none";
document.getElementById(id).style.display="block";
if(id==="records") setTimeout(drawCharts,200);
}

// BUY SELL
function addTrade(){
if(!cowName.value || !cowPrice.value) return;
let d=JSON.parse(localStorage.trades);
d.push({name:cowName.value,price:cowPrice.value,type:cowType.value});
localStorage.trades=JSON.stringify(d);
loadTrades();
}

function loadTrades(){
let d=JSON.parse(localStorage.trades);
let html="<tr><th>Name</th><th>Price</th><th>Type</th><th>X</th></tr>";
d.forEach((t,i)=>{
html+=`<tr><td>${t.name}</td><td>${t.price}</td><td>${t.type}</td>
<td><button onclick="deleteTrade(${i})">X</button></td></tr>`;
});
tradeTable.innerHTML=html;
}

function deleteTrade(i){
let d=JSON.parse(localStorage.trades);
d.splice(i,1);
localStorage.trades=JSON.stringify(d);
loadTrades();
}

// COW TRACK
let cowChartInstance;
function addCowMilk(){
if(!cowTrackName.value || !cowMilk.value) return;
let d=JSON.parse(localStorage.cowMilk);
d.push({name:cowTrackName.value,milk:+cowMilk.value});
localStorage.cowMilk=JSON.stringify(d);
drawCowChart();
}

function drawCowChart(){
let d=JSON.parse(localStorage.cowMilk);
if(cowChartInstance) cowChartInstance.destroy();
cowChartInstance=new Chart(cowChart,{
type:"bar",
data:{labels:d.map(x=>x.name),
datasets:[{label:"Milk",data:d.map(x=>x.milk)}]}
});
}

// BREED SEARCH
function filterBreed(q){
let rows=document.querySelectorAll("#breedTable tr");
rows.forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(q.toLowerCase())?"":"none";
});
}

// POPUP
function showBreed(n,m,p,pl,img){
popup.style.display="block";
bname.innerText=n;
bmilk.innerText="Milk: "+m;
bprice.innerText="Price: "+p;
bplace.innerText="Place: "+pl;
bimg.src=img;
}
function closePopup(){popup.style.display="none";}

// INVOICE
function generateInvoice(){
bill.innerText="Total ₹"+(liters.value*rate.value);
}

// PDF
function downloadPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text("Invoice",20,20);
doc.text("Customer:"+cust.value,20,40);
doc.text("Total:"+liters.value*rate.value,20,60);
doc.save("invoice.pdf");
}

// MODE
function toggleMode(){document.body.classList.toggle("light");}

</script>

</body>
</html>
